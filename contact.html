<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>contact details</title>
</head>

<body bgcolor="skyblue">

   <h1>Ready to Sweat? Contact Us!</h1>

   <form>
      <table border="1" cellpadding="8" cellspacing="5">
         <tr>
            <td>
               <label for="name">Name</label>
               <input type="text" name="username" id="name" placeholder="Enter your Name">
            </td>
         </tr> <br>
         <tr>
            <td>
               <label for="email">Email</label>
               <input type="email" name="useremail" id="email" placeholder="Enter your Email">
            </td>
         </tr> <br>
         <tr>
            <td>
               <label for="call">Phone</label>
               <input type="tel" name="contact" id="call" maxlength="11" placeholder="Phone No.">
            </td>
         </tr> <br>
         <tr>
            <td>
               <label for="">Gender:</label>
               <label for="">Male</label>
               <input type="radio" name="gender">
               <label for="">Female</label>
               <input type="radio"  name="gender">
               <label for="">Other</label>
               <input type="radio" name="gender">
            </td>
         </tr>
         <tr>
            <td>
               <label for="">Membership Type / Services </label>
               <select name="membership">
                  <option value="basic">Basic - Floor Access ($20)</option>
                  <option value="premium">Premium - Glass Wall Studio ($50)</option>
                  <option value="elite">Elite - All Areas + Trainer ($80)</option>
               </select><br><br>

               <label>Interested Services:</label><br>
               <label for="">Pesonal Training</label>
               <input type="checkbox" name="service1" > <br>
               <label for="">Weight Training</label>
               <input type="checkbox" name="service2"><br>
               <label for="">Strength & Muscle Building</label>
               <input type="checkbox" name="service3" >  <br>
               <label for="">Diet & Nutrition Guidance</label>
               <input type="checkbox" name="service4" > <br>
               <label for="">Group Fitness Classes</label>
               <input type="checkbox" name="service5">

            </td>
         </tr>
         <tr>
            <td>
               <label for="c">City:</label>
               <select name="city" id="c">
                  <option value="SELECT CITY:">karachi</option>
                  <option value="">Lahore</option>
                  <option value="">Islamabad</option>
                  <option value="">Multan</option>
                  <option value="">Peshawar</option>
               </select>
            </td>
         </tr>
         <tr>
            <td>
               <label for="text">Write your requirments here...</label>
               <textarea name="requirments" id="text" cols="30" rows="9" placeholder="If you want changes (Less or Add) in your service so must written here!"></textarea>
            </td>
         </tr>
         <tr>
            <td>
               <input type="submit" name="" id="">
            </td>
         </tr>
      </table>
   </form>

         <a href="index.html" target="_blank">Main page</a><br><br>
         <a href="about.html">about gym</a><br><br>
         <a href="gallery.html">looks</a><br><br>
      </b>
   </nav>
</body>

</html>
